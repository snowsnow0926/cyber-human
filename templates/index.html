<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博人类 - 小雪球</title>
    <link rel="stylesheet" href="/static/css/style.css?v=1778995685">
    <script src="/static/js/echarts.min.js?v=1778995685"></script>
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-left">
            <span class="app-title">&#x1F3C4; 赛博人类</span>
            <span class="app-subtitle">小雪球</span>
        </div>
        <div class="header-right">
            <span id="current-time" class="time-display"></span>
            <button id="theme-toggle" class="icon-btn" title="切换深色模式">&#x1F319;</button>
        </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="tab-nav" id="tab-nav">
        <button class="tab-btn active" data-tab="browse">&#x1F310; 今日浏览</button>
        <button class="tab-btn" data-tab="timeline">&#x1F4CB; 时间线</button>
        <button class="tab-btn" data-tab="thoughts">&#x1F4AD; 想法</button>
        <button class="tab-btn" data-tab="diary">&#x1F4DD; 日记</button>
        <button class="tab-btn" data-tab="feed">&#x1F4E8; 投喂</button>
        <button class="tab-btn" data-tab="stats">&#x1F4CA; 统计</button>
        <button class="tab-btn" data-tab="chat">&#x1F4AC; 聊天</button>
        <button class="tab-btn" data-tab="control">&#x2699; 控制</button>
    </nav>

    <!-- Tab Content -->
    <main class="tab-content">

        <!-- 今日浏览 -->
        <section id="tab-browse" class="tab-panel active">
            <h2>今日浏览记录</h2>
            <div id="browse-list" class="card-list">
                <div class="loading">加载中...</div>
            </div>
        </section>

        <!-- 时间线 -->
        <section id="tab-timeline" class="tab-panel">
            <h2>时间线</h2>
            <div style="margin-bottom:12px;display:flex;gap:8px;align-items:center">
                <input type="date" id="timeline-date" class="search-input" style="max-width:180px;flex:0 0 auto">
                <button id="timeline-today-btn" class="primary-btn" style="flex:0 0 auto">今天</button>
            </div>
            <div class="timeline-container" id="timeline-container"></div>
        </section>

        <!-- 想法 -->
        <section id="tab-thoughts" class="tab-panel">
            <h2>想法记录</h2>
            <div id="thoughts-list" class="card-list">
                <div class="loading">加载中...</div>
            </div>
        </section>

        <!-- 日记 -->
        <section id="tab-diary" class="tab-panel">
            <h2>日记</h2>
            <button id="write-diary-btn" class="primary-btn">&#x270F; 写日记</button>
            <div id="diary-list" class="card-list"></div>
        </section>

        <!-- 投喂 -->
        <section id="tab-feed" class="tab-panel">
            <h2>投喂信息给 AI</h2>
            <p style="color:#888;font-size:0.85rem;margin-bottom:12px">
                复制网上的帖子或任何内容，粘贴到下方，小雪球会自动分析并生成想法保存到记忆中。
            </p>
            <div class="card" style="margin-bottom:12px">
                <textarea id="feed-content" class="feed-textarea"
                    placeholder="在这里粘贴你想投喂给 AI 的内容..."
                    rows="6"></textarea>
                <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
                    <button id="btn-feed-submit" class="primary-btn">&#x1F916; 投喂给 AI</button>
                    <span id="feed-status" style="color:#888;font-size:0.85rem"></span>
                </div>
            </div>
            <h3 style="font-size:1rem;margin:16px 0 8px">投喂历史</h3>
            <div id="feed-history" class="card-list"></div>
        </section>

        <!-- 统计 -->
        <section id="tab-stats" class="tab-panel">
            <h2>数据统计</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-num" id="stat-browses">-</div>
                    <div class="stat-label">浏览记录</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="stat-thoughts">-</div>
                    <div class="stat-label">想法</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="stat-diary">-</div>
                    <div class="stat-label">日记</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="stat-feed">-</div>
                    <div class="stat-label">投喂</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="stat-tokens">-</div>
                    <div class="stat-label">Token 消耗</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="stat-cost">-</div>
                    <div class="stat-label">估算成本</div>
                </div>
            </div>
            <div id="chart-container" class="chart-container">
                <div id="chart-memory" class="chart"></div>
            </div>
        </section>

        <!-- 聊天 -->
        <section id="tab-chat" class="tab-panel">
            <h2>和小雪球聊天</h2>
            <div class="chat-container">
                <div id="chat-messages" class="chat-messages"></div>
                <div class="chat-input-row">
                    <input type="text" id="chat-input" class="chat-input" placeholder="输入消息..." autocomplete="off">
                    <button id="chat-send" class="primary-btn">发送</button>
                </div>
            </div>
        </section>

        <!-- 控制 -->
        <section id="tab-control" class="tab-panel">
            <h2>控制面板</h2>
            <div class="control-grid">
                <button id="btn-simulate" class="control-btn">&#x25B6; 模拟一天</button>
                <button id="btn-clear" class="control-btn danger">&#x1F5D1; 清除今日</button>
                <button id="btn-refresh" class="control-btn">&#x1F504; 刷新数据</button>
            </div>
            <div id="control-log" class="control-log"></div>
        </section>

    </main>

    <script src="/static/js/socket.io.min.js?v=1778995685"></script>
    <script src="/static/js/app.js?v=1778995685"></script>
</body>
</html>
