server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name petstars.icu www.petstars.icu;
    return 301 https://$server_name$request_uri;
}

server {
    listen 80;
    server_name 111.229.128.211;
    root /var/www/html;
    index index.html;

    # gemini-chat
    location /gemini-chat/ {
        alias /var/www/html/gemini-chat/;
        index index.html;
    }
    location /gemini-chat/api/ {
        proxy_pass http://127.0.0.1:3006/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # short-drama
    location /short-drama/ {
        alias /var/www/html/short-drama/;
        index index.html;
        try_files $uri $uri/ /short-drama/index.html;
    }
    location /short-drama/api/ {
        proxy_pass http://127.0.0.1:3005/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    # companion
    location /companion {
        alias /var/www/html/companion;
        index index.html;
        try_files $uri $uri/ /companion/index.html;
    }
    location /companion/api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # main api (port 3000)
    location /api/ {
        client_max_body_size 50m;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # Cyber Human Web UI
    location /cyber-human/ {
        proxy_pass http://127.0.0.1:5010/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / { try_files $uri $uri/ =404; }
}

# OpenClaw Hub
server {
    listen 80;
    server_name hub.petstars.icu;
    
    root /var/www/html/openclaw-hub;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3007/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }
}
